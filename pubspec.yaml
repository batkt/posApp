name: pos_app
description: A beautiful mobile POS application

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  intl: ^0.20.2
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  http: ^1.2.0
  share_plus: ^12.0.2
  pdf: ^3.12.0
  printing: ^5.14.3
  pax_sdk: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
