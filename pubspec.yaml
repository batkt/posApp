name: pos_app
description: A beautiful mobile POS application

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  intl: ^0.20.2
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  http: ^1.2.0
  share_plus: ^12.0.2
  pdf: ^3.12.0
  printing: ^5.14.3
  qr_flutter: ^4.1.0
  pax_sdk: ^1.0.4
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/poslogo.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/poslogo.png
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: assets/images/poslogo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/poslogo.png
